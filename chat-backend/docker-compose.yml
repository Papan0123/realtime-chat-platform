services:
  api:
    build: .
    container_name: realtime-chat-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CORS_ORIGIN: http://localhost:8081,http://localhost:3000,http://192.168.1.8:8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: realtime_chat
      DB_SYNC: "true"
      JWT_SECRET: replace-this-with-a-long-random-secret
      JWT_EXPIRES_IN: 7d
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: realtime-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtime_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: realtime-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
